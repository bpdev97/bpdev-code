name: bpdev code macOS Release

on:
  push:
    tags:
      - "personal-v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish macOS arm64
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: release-meta
        name: Resolve personal release version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            raw="$GITHUB_REF_NAME"
            version="${raw#personal-v}"
          else
            version="${DISPATCH_VERSION#personal-v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Personal macOS versions must use X.Y.Z: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=personal-v$version" >> "$GITHUB_OUTPUT"

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Ensure Electron runtime is installed
        run: vp run --filter @t3tools/desktop ensure:electron

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Test
        run: vp run test

      - name: Align package versions
        run: node scripts/update-release-package-versions.ts "${{ steps.release-meta.outputs.version }}"

      - name: Prepare Apple signing
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          required=(CSC_LINK CSC_KEY_PASSWORD APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER)
          for name in "${required[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "Missing GitHub Actions secret: $name" >&2
              exit 1
            fi
          done

          key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$key_path"
          echo "APPLE_API_KEY=$key_path" >> "$GITHUB_ENV"

      - name: Build signed and notarized DMG
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          T3CODE_DESKTOP_UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          vp run dist:desktop:artifact \
            --platform mac \
            --target dmg \
            --arch arm64 \
            --build-version "${{ steps.release-meta.outputs.version }}" \
            --signed \
            --verbose

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-publish
          find release -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.blockmap' -o -name '*.yml' \) \
            -exec cp {} release-publish/ \;
          test -n "$(find release-publish -maxdepth 1 -type f -print -quit)"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: bpdev code v${{ steps.release-meta.outputs.version }}
          generate_release_notes: true
          prerelease: false
          make_latest: true
          files: release-publish/*
          fail_on_unmatched_files: true
