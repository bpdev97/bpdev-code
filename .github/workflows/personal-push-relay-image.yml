name: bpdev code Push Relay Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/personal-push-relay-image.yml"
      - ".dockerignore"
      - "apps/push-relay/**"
      - "packages/contracts/**"
      - "patches/**"
      - "scripts/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "vite.config.ts"
  pull_request:
    paths:
      - ".github/workflows/personal-push-relay-image.yml"
      - ".dockerignore"
      - "apps/push-relay/**"
      - "packages/contracts/**"
      - "patches/**"
      - "scripts/package.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - "vite.config.ts"

permissions:
  contents: read

concurrency:
  group: personal-push-relay-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bpdev-code-push-relay

jobs:
  validate:
    if: github.event_name == 'pull_request'
    name: Validate image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/push-relay/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=personal-push-relay
          cache-to: type=gha,mode=max,scope=personal-push-relay

  publish:
    if: github.event_name != 'pull_request'
    name: Publish image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: metadata
        name: Resolve image metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=sha-

      - id: build
        name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/push-relay/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha,scope=personal-push-relay
          cache-to: type=gha,mode=max,scope=personal-push-relay
          provenance: false
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
