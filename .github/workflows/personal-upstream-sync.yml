name: Tangent Upstream Sync

on:
  schedule:
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: personal-upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Open upstream merge PR
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SYNC_BRANCH: sync/upstream-main
      UPSTREAM_REPOSITORY: pingdotgg/t3code
    steps:
      - name: Checkout personal main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/$UPSTREAM_REPOSITORY.git"
          git fetch --prune upstream main

      - name: Stop when already current
        id: freshness
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Personal main already contains upstream/main." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create upstream merge commit
        if: steps.freshness.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$SYNC_BRANCH"
          git merge --no-ff upstream/main -m "chore: merge upstream/main"

      - name: Push sync branch
        if: steps.freshness.outputs.changed == 'true'
        run: |
          expected="$(git ls-remote --heads origin "$SYNC_BRANCH" | awk '{print $1}')"
          git push \
            --force-with-lease="refs/heads/$SYNC_BRANCH:$expected" \
            origin "HEAD:refs/heads/$SYNC_BRANCH"

      - name: Open or update pull request
        if: steps.freshness.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_number="$(gh pr list --base main --head "$SYNC_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            gh pr create \
              --base main \
              --head "$SYNC_BRANCH" \
              --title "chore: merge upstream/main" \
              --body "Automated upstream merge. Review downstream identity seams and release workflow changes before merging."
          else
            echo "Updated existing upstream sync PR #$pr_number." >> "$GITHUB_STEP_SUMMARY"
          fi
