name: bpdev code iOS Release

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Queue a native TestFlight build or publish an OTA update"
        required: true
        type: choice
        default: update
        options:
          - update
          - build
      message:
        description: "Release message"
        required: false
        type: string

permissions:
  contents: read

jobs:
  release:
    name: iOS ${{ inputs.mode }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: personal-release
    env:
      APP_VARIANT: production
      NODE_OPTIONS: --max-old-space-size=8192
    steps:
      - name: Validate release configuration
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [[ -z "$EXPO_TOKEN" ]]; then
            echo "Missing GitHub Actions secret: EXPO_TOKEN" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: package.json
          cache: true
          run-install: true

      - name: Expose pnpm
        run: |
          pnpm_version="$(node --print "require('./package.json').packageManager.split('@').pop()")"
          vp_pnpm_bin="$HOME/.vite-plus/package_manager/pnpm/$pnpm_version/pnpm/bin"
          echo "$vp_pnpm_bin" >> "$GITHUB_PATH"
          "$vp_pnpm_bin/pnpm" --version

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Pull production environment
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas env:pull production --path .env.local --non-interactive

      - name: Check
        run: vp check

      - name: Typecheck
        run: vp run typecheck

      - name: Queue native build and TestFlight submission
        if: inputs.mode == 'build'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform ios \
            --profile personal \
            --auto-submit-with-profile personal \
            --non-interactive \
            --no-wait

      - name: Publish OTA update
        if: inputs.mode == 'update'
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RELEASE_MESSAGE: ${{ inputs.message || format('Personal OTA ({0})', github.sha) }}
        run: |
          eas update \
            --channel personal \
            --environment production \
            --platform ios \
            --message "$RELEASE_MESSAGE" \
            --non-interactive
